<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gatinhos Aleatórios - API</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Gerador de Gatinhos 🐾</h1>
        
        <div id="cat-container">
            <!-- A imagem começa escondida e sem SRC -->
            <img id="cat-image" src="" alt="Gatinho fofo" style="display: none;">
        </div>

        <!-- Mensagem de erro que só aparece se a API falhar -->
        <p id="error-message" class="error"></p>

        <button id="new-cat-btn">Ver outro gatinho!</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
