<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gatinhos Aleatórios</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Meu Gatinho do Dia 🐾</h1>
        
        <!-- Local onde a imagem será exibida -->
        <div id="cat-container">
            <img id="cat-image" src="" alt="Carregando gatinho fofo..." style="display: none;">
        </div>

        <!-- Mensagem de erro amigável (Critério de Aceitação) -->
        <p id="error-message" class="error"></p>

        <button onclick="location.reload()">Ver outro gatinho</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
